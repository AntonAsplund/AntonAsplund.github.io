<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Påskjakt 🐣</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --moss:  #4a7050;
      --cream: #faf4e1;
      --soft:  #f0e8c8;
      --text:  #2d3820;
    }
    html, body { background: var(--cream); color: var(--text); font-family: 'Lora', serif; }

    header {
      text-align: center;
      padding: 2rem 1rem 1rem;
      background: linear-gradient(160deg, #e8f5e0, var(--cream) 70%);
      border-bottom: 2px solid #c8ddb0;
    }
    header .flowers { font-size: 1.5rem; letter-spacing: .4rem; opacity: .7; }
    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 6vw, 3rem);
      font-style: italic; color: var(--moss); margin: .3rem 0;
    }
    header p { color: #6a7a50; font-size: .95rem; font-style: italic; }

    .tabs-wrap { max-width: 980px; margin: 0 auto; padding: 0 1rem 3rem; }

    .tab-bar {
      display: flex; justify-content: center; gap: .5rem;
      padding: 1.3rem 1rem 0; flex-wrap: wrap;
    }
    .tab-btn {
      background: white; border: 2px solid #c8ddb0; border-bottom: none;
      border-radius: 10px 10px 0 0; padding: .55rem 1.5rem;
      font-family: 'Lora', serif; font-size: .92rem; font-weight: 600;
      color: #7a8a60; cursor: pointer; transition: all .2s;
    }
    .tab-btn:hover { background: var(--soft); color: var(--moss); }
    .tab-btn.active {
      background: var(--soft); color: var(--moss);
      border-color: var(--moss); border-bottom: 2px solid var(--soft);
      position: relative; z-index: 2;
    }
    .tab-panel {
      display: none; background: var(--soft);
      border: 2px solid var(--moss); border-radius: 0 12px 12px 12px;
      padding: 1.8rem 1.5rem 2rem; animation: fadein .3s ease;
    }
    .tab-panel.active { display: block; }
    @keyframes fadein { from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none} }

    .panel-title {
      font-family: 'Playfair Display', serif; font-size: 1.2rem;
      color: var(--moss); margin-bottom: 1.2rem;
    }
    .map-wrap { width: 100%; overflow: auto; }
    svg.map { display: block; margin: 0 auto; max-width: 100%; height: auto; }

    .egg-m { cursor: pointer; }
    .egg-m:hover circle { opacity: 1 !important; }

    #tooltip {
      position: fixed; background: var(--moss); color: white;
      padding: .55rem 1.1rem; border-radius: 8px; font-size: .88rem;
      pointer-events: none; opacity: 0; transition: opacity .2s;
      z-index: 100; font-family: 'Lora',serif;
      max-width: 240px; text-align: center; line-height: 1.4;
    }
    #tooltip.show { opacity: 1; }
    footer { text-align:center; font-size:.78rem; color:#9aaa80; padding:1.5rem; font-style:italic; }
  </style>
</head>
<body>

<header>
  <div class="flowers">🌸 🐣 🌿 🌼 🐇</div>
  <h1>Påskäggjakt</h1>
  <p>Hitta alla gömda ägg — lycka till!</p>
</header>

<div class="tabs-wrap">
  <div class="tab-bar">
    <button class="tab-btn active" onclick="showTab('yard',this)">🌳 Trädgård</button>
    <button class="tab-btn" onclick="showTab('floor1',this)">🏠 Bottenvåning</button>
    <button class="tab-btn" onclick="showTab('floor2',this)">🪜 Övervåning</button>
  </div>

  <!-- ══════════ FLOOR 1 ══════════
    Tracing directly from the image:

    Outer rectangle.
    Vertical wall roughly 35% from left, full height → divides LEFT WING from RIGHT WING.

    LEFT WING (top to bottom):
      - Horizontal wall ~40% from top divides:
          TOP-LEFT = Room 1 (master bedroom). Bed (item 1) top-left corner.
          TOP-MID-LEFT = Room 3 (9yr). Bed (item 2) middle. Kitchen counter (item 7) along top wall + right side.
      - Below that horizontal wall:
          Room 2 (12yr) takes the bottom-left portion. Bed (item 2) top-left. Desk+computer (item 3) bottom area. Shower (item 10) small box bottom-left corner.
          Room 6 (bathroom) small room centre-bottom-left. Toilet (item 9).
          Room 9 (mudroom/ytterhall) centre, has staircase. Enters from bottom of house.

    RIGHT WING = Room 4 (kitchen/living, open plan):
      - Kitchen table (item 8) + TV (item 11) top area
      - Chairs (item 6) around table
      - Hallway table (item 5) top-right
      - Chairs (item 6) around item 5
      - Sofa (item 4) U-shape bottom-right
  ══════════════════════════════════ -->
  <div class="tab-panel" id="tab-floor1">
    <div class="panel-title">🏠 Bottenvåningen</div>
    <div class="map-wrap">
      <!--
        SVG coordinate plan (viewBox 0 0 900 560):
        Outer wall: x=20,y=20 w=860 h=520

        Main vertical divider: x=320, y=20 to y=540
        (left wing = 300px wide, right wing = 560px wide)

        LEFT WING:
          Horizontal divider top portion: y=220 (from x=20 to x=320)
          Room 1 (master): x=20,y=20 w=190 h=200
          Room 3 (9yr):    x=210,y=20 w=110 h=200  ← small room right of master, shares top wall
          Room 2 (12yr):   x=20,y=220 w=190 h=320
          Bathroom(6):     x=210,y=340 w=110 h=100  small, bottom of room-3 column
          Mudroom(9)+stair:x=210,y=220 w=110 h=120  between room3 and bathroom

        RIGHT WING (room 4): x=320,y=20 w=560 h=520
      -->
      <svg class="map" viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <pattern id="floor_a" patternUnits="userSpaceOnUse" width="20" height="20">
            <rect width="20" height="20" fill="#f7f0db"/>
            <rect width="10" height="10" fill="#efe8d1"/>
            <rect x="10" y="10" width="10" height="10" fill="#efe8d1"/>
          </pattern>
          <pattern id="floor_b" patternUnits="userSpaceOnUse" width="20" height="20">
            <rect width="20" height="20" fill="#ece0c8"/>
            <rect x="10" width="10" height="10" fill="#e4d8be"/>
            <rect y="10" width="10" height="10" fill="#e4d8be"/>
          </pattern>
          <pattern id="floor_c" patternUnits="userSpaceOnUse" width="20" height="20">
            <rect width="20" height="20" fill="#edf4f8"/>
            <rect width="10" height="10" fill="#e4eef4"/>
            <rect x="10" y="10" width="10" height="10" fill="#e4eef4"/>
          </pattern>
        </defs>

        <!-- WALL COLOUR: all fills via patterns, walls are stroked -->

        <!-- ── ROOM 1: Master bedroom (top-left) ── -->
        <!-- x=20,y=20 → w=190,h=200 -->
        <rect x="20" y="20" width="190" height="200" fill="url(#floor_a)" stroke="#5a6840" stroke-width="2.5"/>
        <!-- item 1: double bed, top-left corner -->
        <rect x="32" y="32" width="85" height="60" rx="3" fill="#c8b4e0" stroke="#9878c0" stroke-width="1.5"/>
        <rect x="32" y="32" width="85" height="15" rx="3" fill="#b0a0d0"/>
        <line x1="74" y1="32" x2="74" y2="92" stroke="#b0a0d0" stroke-width="1"/>
        <text x="74" y="78" text-anchor="middle" font-family="Lora,serif" font-size="9" fill="#5a3880">Dubbelsäng</text>
        <!-- room label -->
        <text x="115" y="145" text-anchor="middle" font-family="Lora,serif" font-weight="600" font-size="12" fill="#3a4828">Sovrum</text>
        <text x="115" y="160" text-anchor="middle" font-family="Lora,serif" font-size="9" fill="#6a6040" font-style="italic">(föräldrar)</text>
        <!-- door: bottom wall, swings into hallway below -->
        <rect x="130" y="216" width="40" height="4" fill="#f7f0db"/>
        <path d="M130,220 A40,40 0 0,0 170,220" fill="none" stroke="#9ab080" stroke-width="1.3" stroke-dasharray="4,3"/>

        <!-- ── ROOM 3: 9yr bedroom (top, right of master) ── -->
        <!-- x=210,y=20 → w=110,h=200 -->
        <rect x="210" y="20" width="110" height="200" fill="url(#floor_a)" stroke="#5a6840" stroke-width="2.5"/>
        <!-- item 2: bed, against top wall -->
        <rect x="225" y="32" width="55" height="48" rx="3" fill="#a8d4b8" stroke="#60a078" stroke-width="1.4"/>
        <rect x="225" y="32" width="55" height="12" rx="3" fill="#80b898"/>
        <text x="252" y="66" text-anchor="middle" font-family="Lora,serif" font-size="8" fill="#2a5838">Säng</text>
        <!-- room label -->
        <text x="265" y="150" text-anchor="middle" font-family="Lora,serif" font-weight="600" font-size="11" fill="#3a4828">9-åringens</text>
        <text x="265" y="164" text-anchor="middle" font-family="Lora,serif" font-size="9" fill="#6a6040" font-style="italic">rum</text>
        <!-- door: bottom wall into hallway/mudroom -->

        <!-- ── Horizontal wall separating top rooms from bottom ── -->
        <line x1="20" y1="220" x2="320" y2="220" stroke="#5a6840" stroke-width="2.5"/>

        <!-- ── ROOM 2: 12yr bedroom (bottom-left) ── -->
        <!-- x=20,y=220 → w=190,h=320 -->
        <rect x="20" y="220" width="190" height="320" fill="url(#floor_a)" stroke="#5a6840" stroke-width="2.5"/>
        <!-- item 2: bed top-left -->
        <rect x="32" y="232" width="55" height="48" rx="3" fill="#a8d4b8" stroke="#60a078" stroke-width="1.4"/>
        <rect x="32" y="232" width="55" height="12" rx="3" fill="#80b898"/>
        <text x="59" y="266" text-anchor="middle" font-family="Lora,serif" font-size="8" fill="#2a5838">Säng</text>
        <!-- item 3: desk + computer, bottom-right area -->
        <rect x="110" y="460" width="80" height="60" rx="3" fill="#d4c8a8" stroke="#9a8860" stroke-width="1.4"/>
        <rect x="120" y="468" width="50" height="34" rx="2" fill="#1e2e3e" stroke="#444" stroke-width="1"/>
        <rect x="123" y="471" width="44" height="28" rx="1" fill="#163050" opacity=".9"/>
        <text x="150" y="534" text-anchor="middle" font-family="Lora,serif" font-size="8" fill="#4a3820">Skrivbord</text>
        <!-- item 10: shower, bottom-left corner -->
        <rect x="30" y="462" width="55" height="55" rx="2" fill="#b8dcea" stroke="#80aab8" stroke-width="1.3"/>
        <line x1="30" y1="462" x2="85" y2="517" stroke="#80aab8" stroke-width=".8" opacity=".5"/>
        <line x1="85" y1="462" x2="30" y2="517" stroke="#80aab8" stroke-width=".8" opacity=".5"/>
        <text x="57" y="545" text-anchor="middle" font-family="Lora,serif" font-size="8" fill="#2a4858">Dusch</text>
        <!-- room label -->
        <text x="115" y="360" text-anchor="middle" font-family="Lora,serif" font-weight="600" font-size="12" fill="#3a4828">12-åringens</text>
        <text x="115" y="375" text-anchor="middle" font-family="Lora,serif" font-size="9" fill="#6a6040" font-style="italic">rum</text>
        <!-- door: right wall into mudroom area -->
        <rect x="206" y="310" width="4" height="40" fill="#f7f0db"/>
        <path d="M210,310 A40,40 0 0,1 210,350" fill="none" stroke="#9ab080" stroke-width="1.3" stroke-dasharray="4,3"/>

        <!-- ── ROOM 9: Mudroom / Ytterhall (centre, between 9yr bottom and bathroom) ── -->
        <!-- x=210,y=220 → w=110,h=120 -->
        <rect x="210" y="220" width="110" height="120" fill="url(#floor_a)" stroke="#5a6840" stroke-width="2.5"/>
        <text x="265" y="262" text-anchor="middle" font-family="Lora,serif" font-weight="600" font-size="10" fill="#3a4828">Ytterhall</text>
        <!-- staircase symbol (fan) -->
        <g transform="translate(230,278)">
          <!-- stair steps as horizontal lines in a box -->
          <rect width="60" height="55" rx="2" fill="#ddd4b8" stroke="#9a8a68" stroke-width="1.2"/>
          <line x1="0" y1="9"  x2="60" y2="9"  stroke="#b0a080" stroke-width="1"/>
          <line x1="0" y1="18" x2="60" y2="18" stroke="#b0a080" stroke-width="1"/>
          <line x1="0" y1="27" x2="60" y2="27" stroke="#b0a080" stroke-width="1"/>
          <line x1="0" y1="36" x2="60" y2="36" stroke="#b0a080" stroke-width="1"/>
          <line x1="0" y1="45" x2="60" y2="45" stroke="#b0a080" stroke-width="1"/>
        </g>
        <!-- up arrow (stairs go up from here) -->
        <text x="310" y="308" text-anchor="middle" font-size="13" fill="#c04030">⬆</text>
        <!-- front door enters from bottom -->
        <rect x="238" y="336" width="44" height="4" fill="#f7f0db"/>
        <path d="M238,340 A44,44 0 0,0 282,340" fill="none" stroke="#c04030" stroke-width="1.3" stroke-dasharray="4,3"/>
        <text x="265" y="355" text-anchor="middle" font-family="Lora,serif" font-size="8" fill="#c04030">Ytterdörr</text>

        <!-- ── ROOM 6: Bathroom (bottom of centre column) ── -->
        <!-- x=210,y=340 → w=110,h=200 -->
        <rect x="210" y="340" width="110" height="200" fill="url(#floor_c)" stroke="#5a6840" stroke-width="2.5"/>
        <text x="265" y="420" text-anchor="middle" font-family="Lora,serif" font-weight="600" font-size="11" fill="#2a4858">Badrum</text>
        <!-- item 9: toilet -->
        <ellipse cx="240" cy="460" rx="14" ry="17" fill="white" stroke="#80a0b0" stroke-width="1.2"/>
        <ellipse cx="240" cy="457" rx="10" ry="12" fill="#e8f4fc" stroke="#80a0b0" stroke-width="1"/>

<script>
  function showTab(name, btn) {
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    btn.classList.add('active');
  }
  const tip = document.getElementById('tooltip');
  function showTip(e, msg) { tip.textContent = msg; tip.classList.add('show'); pos(e); }
  function hideTip() { tip.classList.remove('show'); }
  function pos(e) { tip.style.left=(e.clientX+14)+'px'; tip.style.top=(e.clientY-44)+'px'; }
  document.addEventListener('mousemove', e => { if(tip.classList.contains('show')) pos(e); });
</script>
